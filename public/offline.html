<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sem conexão - Palm Energy</title>
    <link rel="icon" href="/assets/favicon.png" type="image/x-icon" />
    <style>
      /* Página offline: autocontida de propósito — precisa renderizar
         mesmo sem conseguir baixar nenhum CSS externo */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, sans-serif;
        background: #eef0f4;
        color: #1f2933;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f1522; color: #e5e7eb; }
        .card { background: #1f2937 !important; border-color: #374151 !important; }
      }
      .card {
        background: #ffffff;
        border: 1px solid #e2e5ea;
        border-radius: 16px;
        padding: 32px 28px;
        max-width: 360px;
      }
      .raio { font-size: 40px; }
      h1 { font-size: 20px; margin: 12px 0 8px; }
      p { font-size: 14px; color: #6b7280; line-height: 1.5; }
      button {
        margin-top: 18px;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background: rgb(102, 6, 235);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="raio">⚡</div>
      <h1>Sem conexão</h1>
      <p>
        O Palm Energy precisa de internet pra mostrar seus dados de consumo.
        Verifique sua conexão e tente de novo.
      </p>
      <button onclick="location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
