<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palm Energy - Entrar</title>
  <link rel="icon" href="../assets/favicon.png" type="image/x-icon" />
  <link rel="stylesheet" href="./css/style.css">
</head>

<body style="display: flex; flex-direction: column;">
  <button id="themeToggle" title="Alternar tema">🌙</button>

  <div class="container-title">Controle de energia na palma da sua mão</div>
  <div class="container">
    <div id="login-form" class="form-section active">
      <h2>Entrar</h2>
      <form id="formLogin">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" required />
          <span class="toggle-password" id="toggle-login-password"></span>
        </div>
        <p id="mensagemL"></p>
        <button type="submit" id="login-button">Entrar</button>
      </form>
    </div>
  </div>

  <script type="module" src="auth/login.js"></script>
  <script type="module" src="./js/tema.js"></script>
</body>

</html>
