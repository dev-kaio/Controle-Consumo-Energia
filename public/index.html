<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Palm Energy - Entrar</title>
  <link rel="icon" href="./assets/favicon.png" type="image/x-icon" />
  <link rel="stylesheet" href="./css/style.css">
    <meta name="theme-color" content="#6606eb" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/icon-180.png" />
    <script defer src="/js/pwa.js"></script>
  </head>

<body>
  <button id="themeToggle" title="Alternar tema">🌙</button>

  <div class="container-title">
    <span class="bolt">⚡</span> Palm Energy
    <span class="tagline">Controle de energia na palma da sua mão</span>
  </div>

  <div class="container">
    <div id="login-form" class="form-section active">
      <h2>Entrar</h2>
      <form id="formLogin">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" required />
          <span class="toggle-password" id="toggle-login-password"></span>
        </div>
        <p id="mensagemL"></p>
        <button type="submit" id="login-button">Entrar</button>
      </form>
    </div>
  </div>

  <script type="module" src="auth/login.js"></script>
  <script src="./js/tema.js"></script>
</body>

</html>
