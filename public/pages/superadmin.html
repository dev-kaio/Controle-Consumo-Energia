<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../assets/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="../css/menu.css" />
    <title>Superadmin - Palm Energy</title>
  </head>

  <body>
    <header class="app-header">
      <button class="menu-btn" id="menuBtn" title="Menu">☰</button>
      <span class="brand"><span class="bolt">⚡</span><span class="brand-nome">Palm Energy</span></span>
      <span class="spacer"></span>
      <button id="themeToggle" title="Alternar tema">🌙</button>
    </header>

    <div class="sidebar" id="sidebar">
      <a href="./menu.html">Dashboard</a>
      <a href="./admin.html">Inquilinos</a>
      <a href="./estrutura.html">Estrutura</a>
      <a href="./config.html">Configurações</a>
      <a href="../index.html" id="logout">Sair</a>
    </div>

    <main class="dashboard">
      <span class="section-title">Administração do sistema</span>

      <!-- CADASTRAR USUÁRIO (UNIFICADO) -->
      <div class="panel">
        <h2>Cadastrar usuário</h2>
        <p class="panel-desc">
          Admin gerencia um condomínio inteiro; inquilino é vinculado a um
          apartamento. O condomínio e o apartamento precisam existir na
          <a href="./estrutura.html">Estrutura</a>.
        </p>
        <form id="formUsuario" class="form-linha">
          <div class="campo">
            <label for="tipoUsuario">Perfil</label>
            <select id="tipoUsuario">
              <option value="inquilino">Inquilino</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Nome completo" />
          </div>
          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@exemplo.com" />
          </div>
          <div class="campo">
            <label for="senha">Senha inicial</label>
            <input type="password" id="senha" placeholder="Senha" />
          </div>
          <div class="campo">
            <label for="condominioID">Condomínio</label>
            <select id="condominioID"></select>
          </div>
          <div class="campo" id="campoApartamento">
            <label for="apartamento">Apartamento</label>
            <select id="apartamento"></select>
          </div>
          <button type="submit" class="btn-primary">Cadastrar</button>
        </form>
        <p class="msg-feedback" id="msgUsuario"></p>
      </div>

      <!-- USUÁRIOS POR CONDOMÍNIO -->
      <div class="panel">
        <h2>Usuários por condomínio</h2>
        <div class="form-linha">
          <div class="campo">
            <label for="filtroNome">Buscar por nome</label>
            <input type="text" id="filtroNome" placeholder="Digite um nome..." />
          </div>
          <div class="campo">
            <label for="filtroCondominio">Condomínio</label>
            <select id="filtroCondominio">
              <option value="">Todos os Condomínios</option>
            </select>
          </div>
          <button type="button" id="expandirTodos" class="btn-primary">Expandir</button>
          <button type="button" id="colapsarTodos" class="btn-primary">Colapsar</button>
        </div>

        <div id="listaCondominios" style="margin-top: 18px"></div>
      </div>
    </main>

    <script type="module" src="../js/superadmin.js"></script>
    <script type="module" src="../js/sidebar.js"></script>
    <script src="../js/tema.js"></script>
  </body>
</html>
