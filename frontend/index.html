<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="icon" href="/assets/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <meta name="theme-color" content="#6606eb" />
    <link rel="apple-touch-icon" href="/assets/icon-180.png" />
    <title>Palm Energy</title>
  </head>
  <body>
    <!-- Aplica o tema escuro ANTES do React montar (e antes da primeira
         pintura) — sem isso, quem usa dark veria um flash branco a cada
         carregamento. O React (useTema) só alterna e persiste depois. -->
    <script>
      if (localStorage.getItem("tema") === "dark") {
        document.body.classList.add("dark");
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
