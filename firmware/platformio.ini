; PlatformIO — firmware da ESP32 (medidor via Modbus RTU → backend por HTTPS).
;
; Como usar: abra a pasta firmware/ no VS Code com a extensão PlatformIO, ou
; copie ela inteira pra usar como projeto. O esp.cpp fica na RAIZ desta pasta
; (não em src/), por isso o src_dir abaixo.

[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev            ; devkit genérico; se o upload falhar, tente esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200     ; bate com o Serial.begin(115200) do esp.cpp
lib_deps =
	bblanchon/ArduinoJson
	4-20ma/ModbusMaster
	plerup/EspSoftwareSerial
